<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeaR — Live Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06060a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      user-select: none;
      /* Whole background is a drag handle — anything NOT marked no-drag moves the window */
      -webkit-app-region: drag;
    }

    /* ── Stage atmosphere ── */
    .stage-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .stage-bg::before {
      content: '';
      position: absolute;
      width: 900px; height: 700px;
      top: -200px; left: -200px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(110,70,220,0.18) 0%, rgba(79,219,200,0.06) 50%, transparent 70%);
      filter: blur(60px);
      animation: bloom1 14s ease-in-out infinite alternate;
    }
    .stage-bg::after {
      content: '';
      position: absolute;
      width: 800px; height: 600px;
      bottom: -180px; right: -180px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(79,219,200,0.14) 0%, rgba(160,100,255,0.07) 50%, transparent 70%);
      filter: blur(60px);
      animation: bloom2 18s ease-in-out infinite alternate;
    }
    @keyframes bloom1 {
      from { transform: translate(0,0) scale(1); opacity: 0.8; }
      to   { transform: translate(80px,40px) scale(1.12); opacity: 1; }
    }
    @keyframes bloom2 {
      from { transform: translate(0,0) scale(1); opacity: 0.7; }
      to   { transform: translate(-60px,-40px) scale(1.1); opacity: 1; }
    }
    .centre-glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 560px; height: 560px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(208,188,255,0.13) 0%, rgba(79,219,200,0.05) 45%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.08); }
    }
    .dot-grid {
      position: fixed; inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* ── Stage layout ── */
    .stage {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Brand header ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      -webkit-app-region: no-drag;
    }
    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4fdbc8;
      background: rgba(79,219,200,0.1);
      border: 1px solid rgba(79,219,200,0.25);
      margin-bottom: 14px;
    }
    .brand-pill::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4fdbc8;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .brand-name {
      font-size: 60px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #e8e0ff 0%, #d0bcff 40%, #a07cff 70%, #4fdbc8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-tagline {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 400;
      color: rgba(203,195,215,0.5);
      letter-spacing: 0.04em;
    }

    /* ── Window chrome (close button) ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 100;
      /* inherits drag from body */
    }
    .win-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
    }
    .close-btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #3a3840;
      border: none;
      cursor: default;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
    }
    .close-btn:hover { background: #ff5f57; }

    /* ── S25 Ultra device ── */
    .device {
      position: relative;
      width: 380px;
      height: 828px;
      border-radius: 50px;
      flex-shrink: 0;
      /* Critical: no-drag so the device body is interactive */
      -webkit-app-region: no-drag;

      background: linear-gradient(168deg,
        #1e1c22 0%, #131118 30%, #100f13 55%, #181519 80%, #1d1b20 100%);

      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.10),
        inset -1px 0   0 rgba(255,255,255,0.03),
        inset  0 -1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 80px rgba(160,100,255,0.22),
        0 0 160px rgba(79,219,200,0.08),
        0 40px 120px rgba(0,0,0,0.95);

      animation: float 7s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    .device::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50px;
      background: linear-gradient(128deg,
        rgba(240,234,228,0.09) 0%, rgba(160,155,150,0.02) 28%,
        transparent 50%, rgba(180,175,170,0.03) 82%, rgba(230,224,218,0.08) 100%);
      pointer-events: none;
    }

    /* ── Screen — MUST be no-drag so all mouse events reach the iframe ── */
    .screen-wrapper {
      position: absolute;
      top: 10px; left: 7px; right: 7px; bottom: 10px;
      border-radius: 42px;
      overflow: hidden;
      background: #000;
      box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.07);
      -webkit-app-region: no-drag;
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
      -webkit-app-region: no-drag;
    }

    /* ── Status bar ── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 24px;
      z-index: 20;
      pointer-events: none;
      background: transparent;
    }
    .status-time {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
    }
    .status-icons { display: flex; align-items: center; gap: 5px; }
    .signal { display: flex; align-items: flex-end; gap: 1.5px; height: 10px; }
    .signal span { display: block; width: 2.5px; background: rgba(255,255,255,0.88); border-radius: 1px; }
    .signal span:nth-child(1) { height: 3px; }
    .signal span:nth-child(2) { height: 5px; }
    .signal span:nth-child(3) { height: 7px; }
    .signal span:nth-child(4) { height: 10px; }
    .battery { display: flex; align-items: center; gap: 2px; }
    .battery-body { width: 21px; height: 10px; border: 1.5px solid rgba(255,255,255,0.72); border-radius: 2px; padding: 1.5px; }
    .battery-fill { width: 72%; height: 100%; background: rgba(255,255,255,0.84); border-radius: 1px; }
    .battery-tip { width: 2px; height: 4.5px; background: rgba(255,255,255,0.55); border-radius: 0 1px 1px 0; }

    /* ── Camera ── */
    .camera-hole {
      position: absolute;
      top: 9px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 12px;
      background: #020102; border-radius: 50%;
      z-index: 30;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,0.95), inset 0 0 3px rgba(0,0,0,0.9);
    }
    .camera-hole::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 5px; height: 5px;
      background: radial-gradient(circle at 32% 32%, #1e243a, #050408);
      border-radius: 50%;
    }

    /* ── Home indicator ── */
    .home-indicator {
      position: absolute;
      bottom: 7px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 3.5px;
      background: rgba(255,255,255,0.26); border-radius: 2px;
      z-index: 20; pointer-events: none;
    }

    /* Edge fades */
    .screen-top-fade {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
      z-index: 15; pointer-events: none; border-radius: 42px 42px 0 0;
    }
    .screen-bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
      background: linear-gradient(0deg, rgba(0,0,0,0.45) 0%, transparent 100%);
      z-index: 15; pointer-events: none; border-radius: 0 0 42px 42px;
    }

    /* Side buttons */
    .btn { position: absolute; border-radius: 0 3px 3px 0; }
    .btn-right { right: -3px; background: linear-gradient(90deg, #161418, #211f23); box-shadow: 2px 0 4px rgba(0,0,0,0.75); }
    .btn-vol-up { top: 200px; width: 4px; height: 56px; }
    .btn-vol-dn { top: 272px; width: 4px; height: 56px; }
    .btn-power  { top: 380px; width: 4px; height: 80px; }

    .spen-slot { position: absolute; bottom: 4px; left: 12px; width: 4px; height: 6px; background: #080808; border-radius: 1px 1px 2.5px 2.5px; }
    .usb-port  { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 32px; height: 6px; background: #090808; border-radius: 3px; }
    .speaker   { position: absolute; bottom: 5px; display: flex; gap: 2px; align-items: center; }
    .speaker.left  { left: 52px; }
    .speaker.right { right: 52px; }
    .speaker span  { display: block; width: 2px; height: 4.5px; background: #0c0b0e; border-radius: 1.5px; }

    /* ── Stats caption ── */
    .caption {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      -webkit-app-region: no-drag;
    }
    .caption-stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .caption-stat-value {
      font-size: 18px; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #d0bcff, #4fdbc8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .caption-stat-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(203,195,215,0.35);
    }
    .caption-divider { width: 1px; height: 28px; background: rgba(203,195,215,0.1); }
  </style>
</head>
<body>

  <div class="stage-bg"></div>
  <div class="centre-glow"></div>
  <div class="dot-grid"></div>

  <!-- Window chrome -->
  <div class="topbar">
    <span class="win-label">WeaR Preview</span>
    <button class="close-btn" id="closeBtn" title="Close"></button>
  </div>

  <div class="stage">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-pill">Live Demo</div>
      <div class="brand-name">WeaR</div>
      <div class="brand-tagline">Your AI personal stylist — always in your pocket</div>
    </div>

    <!-- S25 Ultra -->
    <div class="device">
      <div class="screen-wrapper" id="screenWrapper">

        <iframe id="appFrame" src="" allow="camera; microphone; clipboard-read; clipboard-write"></iframe>

        <div class="screen-top-fade"></div>
        <div class="screen-bottom-fade"></div>

        <div class="status-bar">
          <span class="status-time" id="clock">9:41</span>
          <div class="status-icons">
            <div class="signal"><span></span><span></span><span></span><span></span></div>
            <svg width="13" height="10" viewBox="0 0 14 11" fill="none" style="margin-top:1px">
              <path d="M7 9.5C7.55 9.5 8 9.05 8 8.5S7.55 7.5 7 7.5 6 7.95 6 8.5s.45 1 1 1z" fill="rgba(255,255,255,0.88)"/>
              <path d="M4.3 7.2C4.9 6.5 5.9 6 7 6c1.1 0 2.1.5 2.7 1.2" stroke="rgba(255,255,255,0.88)" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M2.1 4.9C3.2 3.7 5 2.9 7 2.9S10.8 3.7 11.9 4.9" stroke="rgba(255,255,255,0.88)" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M.5 2.8C2 1.1 4.4 0 7 0s5 1.1 6.5 2.8" stroke="rgba(255,255,255,0.88)" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <div class="battery">
              <div class="battery-body"><div class="battery-fill"></div></div>
              <div class="battery-tip"></div>
            </div>
          </div>
        </div>

        <div class="home-indicator"></div>
      </div>

      <div class="camera-hole"></div>

      <div class="btn btn-right btn-vol-up"></div>
      <div class="btn btn-right btn-vol-dn"></div>
      <div class="btn btn-right btn-power"></div>

      <div class="spen-slot"></div>
      <div class="usb-port"></div>
      <div class="speaker left"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="speaker right"><span></span><span></span><span></span><span></span><span></span></div>
    </div>

    <!-- Stats -->
    <div class="caption">
      <div class="caption-stat">
        <span class="caption-stat-value">Zero UI</span>
        <span class="caption-stat-label">Outfit on open</span>
      </div>
      <div class="caption-divider"></div>
      <div class="caption-stat">
        <span class="caption-stat-value">Tap · Swipe</span>
        <span class="caption-stat-label">Refine in seconds</span>
      </div>
      <div class="caption-divider"></div>
      <div class="caption-stat">
        <span class="caption-stat-value">AI-first</span>
        <span class="caption-stat-label">Wardrobe concierge</span>
      </div>
    </div>

  </div>

  <script>
    /* Load app URL from hash (set by Electron main process) with demo bypass */
    const hash = location.hash.slice(1);
    const appUrl = hash ? decodeURIComponent(hash) + '?demo=1' : 'http://localhost:5173/?demo=1';
    document.getElementById('appFrame').src = appUrl;

    /* Live clock */
    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    }
    tick();
    setInterval(tick, 10000);

    /* Close */
    document.getElementById('closeBtn').addEventListener('click', () => window.close());
  </script>
</body>
</html>
